<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deli Eminn — Admin Panel v2</title>
  <!-- Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <style>
    :root {
      --bg: #0a0a0b; --bg-card: #141416; --bg-input: #1a1a1e;
      --border: #333; --border-focus: #e63946;
      --accent: #e63946; --accent-hover: #c0313c;
      --text: #fff; --text-muted: #888;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    .btn { padding: 0.6rem 1rem; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline { background: transparent; border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    /* LOGIN */
    .login { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
    .login__box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 400px; }
    .login__sub { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .field { margin-bottom: 1.2rem; }
    .field label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.4rem; text-transform: uppercase; }
    .field input, .field select, .field textarea { width: 100%; padding: 0.7rem; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text); outline: none; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--border-focus); }
    
    /* DASHBOARD */
    .dashboard { display: none; padding: 2rem; max-width: 1200px; margin: 0 auto; }
    .dashboard.active { display: block; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
    .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; }
    .tab-btn { padding: 0.5rem 1.5rem; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted); border-radius: 6px; cursor: pointer; }
    .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* LAYOUT: EDITOR & PREVIEW */
    .editor-layout { display: flex; flex-direction: column; gap: 2rem; }
    
    /* TOOLBAR */
    .toolbar { display: flex; gap: 0.5rem; background: #222; padding: 0.5rem; border-top-left-radius: 8px; border-top-right-radius: 8px; border: 1px solid var(--border); border-bottom: none; }
    .toolbar button { background: none; border: none; color: #fff; cursor: pointer; padding: 0.2rem 0.5rem; font-size: 0.9rem; border-radius: 4px; }
    .toolbar button:hover { background: #333; }
    .markdown-editor { border-top-left-radius: 0; min-height: 250px; resize: vertical; }

    /* PREVIEW */
    .preview-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; margin-top: 1rem; }
    .preview-header { display: flex; justify-content: space-between; padding: 1rem; background: #000; border-bottom: 1px solid var(--border); align-items: center; }
    
    /* PREVIEW STYLING (Real Project Card layout) */
    .preview-body { background: var(--bg); color: var(--text); padding: 2rem; flex: 1; overflow-y: auto; margin: 0 auto; width: 100%; transition: all 0.3s ease; }
    .preview-body.mobile { max-width: 420px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    
    .project-row {
      display: grid;
      grid-template-columns: 1fr;
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    /* Destop Layout override */
    .preview-body:not(.mobile) .project-row { grid-template-columns: 45% 1fr; }
    
    .project-row__video { width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; min-height: 250px; }
    .project-row__video iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }
    .project-row__video span { color: #888; font-size: 0.9rem; }
    
    .project-row__info { padding: 2rem; display: flex; flex-direction: column; justify-content: center; }
    .project-row__meta { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
    .project-row__category { font-family: monospace; font-size: 0.75rem; color: var(--accent); padding: 0.2rem 0.6rem; background: rgba(230,57,70,0.1); border: 1px solid rgba(230,57,70,0.2); border-radius: 4px; text-transform: uppercase; }
    .project-row__brand { font-family: monospace; font-size: 0.75rem; color: var(--text-muted); padding-left: 0.5rem; border-left: 1px solid rgba(255,255,255,0.1); }
    .project-row__date { font-size: 0.75rem; color: var(--text-muted); margin-left: auto; }
    .project-row__title { font-size: 1.8rem; line-height: 1.3; margin-bottom: 1rem; font-weight: 700; color:#fff; }
    
    .project-row__desc { color: #aaa; line-height: 1.7; font-size: 1rem; }
    .project-row__desc p { margin-bottom: 1rem; }
    .project-row__desc img { max-width: 100%; height: auto; border-radius: 8px; margin: 1rem 0; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    .project-row__desc a { color: var(--accent); }


    /* FAQ LIST */
    .faq-item { background: var(--bg-input); border: 1px solid var(--border); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; display: flex; justify-content: space-between; gap: 1rem; }
    .faq-item__content { flex: 1; }
    .faq-item__q { font-weight: bold; margin-bottom: 0.5rem; }
    .faq-item__a { font-size: 0.9rem; color: var(--text-muted); }
    .faq-actions { display: flex; align-items: center; }

    /* PROJECT LIST */
    .project-item { background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 0.8rem; display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login" id="loginScreen">
    <div class="login__box">
      <h1 style="margin-bottom:0.5rem">🔧 Deli Eminn CMS</h1>
      <p class="login__sub">v2.0 İçerik Yönetimi</p>
      <div class="field"><label>Kullanıcı</label><input type="text" id="username" /></div>
      <div class="field"><label>Şifre</label><input type="password" id="password" /></div>
      <button class="btn" style="width:100%" id="loginBtn">Giriş Yap</button>
      <div id="loginError" style="color:var(--accent); margin-top:1rem; font-size:0.9rem"></div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <div class="header">
      <h2>🔧 Deli Eminn CMS v2.0</h2>
      <button class="btn btn-outline" id="logoutBtn">Çıkış Yap</button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('projeler')">Projeler / Blog</button>
      <button class="tab-btn" onclick="switchTab('faq')">Sık Sorulan Sorular (SSS)</button>
    </div>

    <!-- TAB: PROJELER -->
    <div id="tab-projeler" class="tab-content active">
      <div class="editor-layout">
        <!-- FORM SUTUNU -->
        <div class="form-section">
          <form id="projectForm">
            <div class="field"><label>Proje Başlığı *</label><input type="text" id="projTitle" required /></div>
            
            <div style="display:flex; gap:1rem;">
              <div class="field" style="flex:1"><label>Kategori</label>
                <select id="projCategory">
                  <option value="ECU Remap">ECU Remap</option>
                  <option value="Dyno Test">Dyno Test</option>
                  <option value="CVT">CVT</option>
                  <option value="Motor Revizyon">Motor Revizyon</option>
                  <option value="Modifiye" selected>Modifiye</option>
                  <option value="Bakım">Bakım</option>
                  <option value="Arıza Çözüm">Arıza Çözüm</option>
                </select>
              </div>
              <div class="field" style="flex:1"><label>Marka / Model</label><input type="text" id="projBrand" /></div>
            </div>
            
            <div style="display:flex; gap:1rem;">
              <div class="field" style="flex:1"><label>YouTube Linki (Opsiyonel)</label><input type="url" id="projVideo" /></div>
              <div class="field" style="flex:1"><label>Tarih</label><input type="date" id="projDate" /></div>
            </div>

            <div class="field">
              <label>Açıklama / İçerik (Markdown) *</label>
              <!-- TOOLBAR -->
              <div class="toolbar">
                <button type="button" onclick="insertAtCursor('**Kalın**')"><b>B</b></button>
                <button type="button" onclick="insertAtCursor('*İtalik*')"><i>I</i></button>
                <button type="button" onclick="insertAtCursor('\n- Liste Elemanı')">• Liste</button>
                <button type="button" onclick="insertAtCursor('\n## Alt Başlık')">H2</button>
                <button type="button" onclick="document.getElementById('imgUpload').click()" style="color:var(--accent); font-weight:bold;">🖼️ Resim Ekle</button>
              </div>
              <input type="file" id="imgUpload" accept="image/*" style="display:none" />
              <textarea id="projDesc" class="markdown-editor" required></textarea>
            </div>
            <button class="btn" style="width:100%" type="submit" id="submitProjBtn">Projeyi Yayınla</button>
            <div id="projStatus" style="margin-top:1rem;font-size:0.9rem"></div>
          </form>

          <div style="margin-top: 3rem; border-top: 1px solid var(--border); padding-top: 1rem;">
            <h3 style="margin-bottom:1rem; color:var(--text-muted)">Mevcut Projeler</h3>
            <div id="projectsList">Yükleniyor...</div>
          </div>
        </div>

        <!-- PREVIEW SUTUNU -->
        <div class="preview-section">
          <div class="preview-header">
            <span style="font-size:0.9rem; color:var(--text-muted)">Canlı Önizleme</span>
            <div>
              <button type="button" class="btn btn-outline" style="font-size:0.7rem; padding:0.3rem" onclick="togglePreview('pc')">💻 PC</button>
              <button type="button" class="btn btn-outline" style="font-size:0.7rem; padding:0.3rem" onclick="togglePreview('mobile')">📱 Mobil</button>
            </div>
          </div>
          <div class="preview-body" id="previewArea">
            <p style="color:#888; text-align:center; margin-top:2rem;">Yazılan içerik burada HTML olarak görünecektir...</p>
          </div>
        </div>
      </div>
    </div>

    <!-- TAB: FAQ -->
    <div id="tab-faq" class="tab-content">
      <h3 style="margin-bottom:1rem">Yeni SSS Ekle</h3>
      <div style="background:var(--bg-card); padding:1.5rem; border-radius:8px; border:1px solid var(--border); margin-bottom:2rem;">
        <div class="field"><label>Soru</label><input type="text" id="faqQ" /></div>
        <div class="field"><label>Cevap</label><textarea id="faqA" style="min-height:80px"></textarea></div>
        <button class="btn" onclick="addFaq()">Kayıt Ekle</button>
        <span id="faqStatus" style="margin-left:1rem; font-size:0.9rem"></span>
      </div>

      <h3 style="margin-bottom:1rem">Mevcut Sorular</h3>
      <div id="faqList">Yükleniyor...</div>
      <button class="btn btn-outline" style="margin-top:1rem; width:100%" onclick="saveFaqData()">Tüm Değişiklikleri GitHub'a Kaydet</button>
    </div>
  </div>

  <script>
    // --- AUTH ---
    document.getElementById('loginBtn').onclick = async () => {
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const res = await fetch('/api/auth', { method: 'POST', body: JSON.stringify({username:user, password:pass}), headers:{'Content-Type':'application/json'} });
      if(res.ok) {
        sessionStorage.setItem('token', (await res.json()).token);
        initDashboard();
      } else {
        document.getElementById('loginError').textContent = "Hatalı giriş.";
      }
    };
    document.getElementById('logoutBtn').onclick = () => { sessionStorage.removeItem('token'); window.location.reload(); };

    if(sessionStorage.getItem('token')) initDashboard();

    function initDashboard() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').classList.add('active');
      document.getElementById('projDate').valueAsDate = new Date();
      loadProjects();
      loadFaqs();
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + tabId).classList.add('active');
      event.target.classList.add('active');
    }

    // --- MARKDOWN & PREVIEW ---
    const textarea = document.getElementById('projDesc');
    const preview = document.getElementById('previewArea');

    function insertAtCursor(text) {
      const start = textarea.selectionStart; const end = textarea.selectionEnd;
      textarea.value = textarea.value.substring(0, start) + text + textarea.value.substring(end);
      textarea.selectionStart = textarea.selectionEnd = start + text.length;
      textarea.focus();
      updatePreview();
    }

    function updatePreview() {
      const title = document.getElementById('projTitle').value || 'Canlı Önizleme Başlığı';
      const category = document.getElementById('projCategory').value;
      const brand = document.getElementById('projBrand').value || 'Motor Marka/Model';
      const date = document.getElementById('projDate').value;
      const fDate = new Date(date||Date.now()).toLocaleDateString('tr-TR', { year: 'numeric', month: 'long', day: 'numeric' });
      const video = document.getElementById('projVideo').value;
      let ytId = null;
      if(video) {
        const m = video.match(/(?:youtu\.be\/|v=|\/embed\/)([a-zA-Z0-9_-]{11})/);
        ytId = m ? m[1] : null;
      }

      const mdHtml = marked.parse(textarea.value || '*İçerik bekleniyor...*');

      preview.innerHTML = `
        <article class="project-row">
          <div class="project-row__video">
            ${ytId 
              ? `<iframe src="https://www.youtube.com/embed/${ytId}" frameborder="0" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`
              : `<span>📸 (Video eklenmedi)</span>`
            }
          </div>
          <div class="project-row__info">
            <div class="project-row__meta">
              <span class="project-row__category">${category}</span>
              <span class="project-row__brand">${brand}</span>
              <span class="project-row__date">${fDate}</span>
            </div>
            <h2 class="project-row__title">${title}</h2>
            <div class="project-row__desc">${mdHtml}</div>
          </div>
        </article>
      `;
    }
    
    // Attach listeners to update preview immediately on typing
    ['projTitle', 'projCategory', 'projBrand', 'projDate', 'projVideo'].forEach(id => {
       document.getElementById(id).addEventListener('input', updatePreview);
    });
    textarea.addEventListener('input', updatePreview);

    function togglePreview(mode) {
      if(mode === 'mobile') preview.classList.add('mobile');
      else preview.classList.remove('mobile');
    }

    // --- IMAGE UPLOAD ---
    let isUploading = false;
    document.getElementById('imgUpload').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if(!file) return;

      isUploading = true;
      document.getElementById('submitProjBtn').disabled = true;
      document.getElementById('submitProjBtn').textContent = 'Resim Yükleniyor... Lütfen bekleyin';

      // HTML5 Canvas base client-side compression (Max 1200px width)
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = (ev) => {
        const img = new Image();
        img.src = ev.target.result;
        img.onload = async () => {
          let w = img.width, h = img.height;
          if(w > 1200) { h = (h/w)*1200; w = 1200; }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          
          const base64 = canvas.toDataURL('image/jpeg', 0.85); // Compress to 85% JPG
          
          // Show placeholder in editor
          const placeholderId = `resim_${Date.now()}`;
          const placeholder = `![Yükleniyor...](${placeholderId})`;
          insertAtCursor(placeholder);
          
          try {
            const res = await fetch('/api/upload', {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${sessionStorage.getItem('token')}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({ filename: file.name, base64 })
            });

            if(res.ok) {
              const data = await res.json();
              textarea.value = textarea.value.replace(placeholder, `![Görsel](${data.url})`);
              updatePreview();
              alert("✅ Resim başarıyla yüklendi ve eklendi!");
            } else {
              textarea.value = textarea.value.replace(placeholder, `(RESİM YÜKLENEMEDİ)`);
              updatePreview();
              alert("❌ Resim yükleme hatası. Lütfen resmi tekrar yükleyin.");
            }
          } catch {
             textarea.value = textarea.value.replace(placeholder, `(SUNUCU HATASI)`);
             updatePreview();
             alert("❌ Sunucu hatası oluştu.");
          } finally {
             isUploading = false;
             document.getElementById('submitProjBtn').disabled = false;
             document.getElementById('submitProjBtn').textContent = 'Projeyi Yayınla';
          }
        };
      };
      // clear input
      e.target.value = '';
    });

    // --- PROJECTS MANAGEMENT ---
    async function loadProjects() {
      const res = await fetch('/api/projects', { headers: { 'Authorization': `Bearer ${sessionStorage.getItem('token')}` }});
      if(!res.ok) return;
      const data = await res.json();
      const div = document.getElementById('projectsList');
      div.innerHTML = data.map(p => `
        <div class="project-item">
          <div>
            <b>${p.title}</b><br>
            <span style="font-size:0.8rem;color:#888">${p.date} · ${p.category}</span>
          </div>
          <button class="btn btn-outline" style="padding:0.3rem" onclick="deleteObj('/api/projects', '${p.filename}', '${p.sha}')">Sil</button>
        </div>
      `).join('');
    }

    document.getElementById('projectForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitProjBtn');
      const st = document.getElementById('projStatus');
      btn.disabled = true; st.textContent = 'Yayınlanıyor... Lütfen bekleyin...';

      const data = {
        title: document.getElementById('projTitle').value,
        description: textarea.value,
        videoUrl: document.getElementById('projVideo').value,
        category: document.getElementById('projCategory').value,
        brand: document.getElementById('projBrand').value,
        date: document.getElementById('projDate').value
      };

      const res = await fetch('/api/projects', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${sessionStorage.getItem('token')}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if(res.ok) {
        st.style.color = '#2ecc71'; st.textContent = "✅ Proje başarıyla yayınlandı!";
        e.target.reset();
        document.getElementById('projDate').valueAsDate = new Date();
        updatePreview();
        loadProjects();
      } else {
        st.style.color = 'var(--accent)'; st.textContent = "Hata oluştu.";
      }
      btn.disabled = false;
    };

    async function deleteObj(apiStr, filename, sha) {
      if(!confirm("Silmek istediğinize emin misiniz?")) return;
      await fetch(apiStr, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${sessionStorage.getItem('token')}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename, sha })
      });
      loadProjects();
    }

    // --- FAQ MANAGEMENT ---
    let myFaqs = [];
    let faqSha = '';

    async function loadFaqs() {
      const res = await fetch('/api/faq', { headers: { 'Authorization': `Bearer ${sessionStorage.getItem('token')}` }});
      if(!res.ok) return;
      const data = await res.json();
      myFaqs = data.faq || [];
      faqSha = data.sha || '';
      renderFaqs();
    }

    function renderFaqs() {
      const div = document.getElementById('faqList');
      if(myFaqs.length===0) { div.innerHTML = "<p>Soru bulunamadı.</p>"; return; }
      div.innerHTML = myFaqs.map((f, i) => `
        <div class="faq-item">
          <div class="faq-item__content">
            <div class="faq-item__q">${f.question}</div>
            <div class="faq-item__a">${f.answer}</div>
          </div>
          <div class="faq-actions">
            <button class="btn btn-outline" style="border-color:var(--accent); color:var(--accent); padding:0.2rem 0.5rem;" onclick="removeFaq(${i})">Sil</button>
          </div>
        </div>
      `).join('');
    }

    function addFaq() {
      const q = document.getElementById('faqQ').value.trim();
      const a = document.getElementById('faqA').value.trim();
      if(!q || !a) return;
      myFaqs.push({ question: q, answer: a });
      document.getElementById('faqQ').value = '';
      document.getElementById('faqA').value = '';
      renderFaqs();
      document.getElementById('faqStatus').style.color = 'yellow';
      document.getElementById('faqStatus').textContent = "⚠️ Değişiklik kaydedilmedi. Alttaki butona basarak GitHub'a kaydedin.";
    }

    function removeFaq(idx) {
      myFaqs.splice(idx, 1);
      renderFaqs();
      document.getElementById('faqStatus').style.color = 'yellow';
      document.getElementById('faqStatus').textContent = "⚠️ Değişiklik kaydedilmedi. Alttaki butona basarak GitHub'a kaydedin.";
    }

    async function saveFaqData() {
      const btn = event.target;
      btn.disabled = true; btn.textContent = 'Kaydediliyor... DİKKAT SEKMEYİ KAPATMAYIN!';
      
      const res = await fetch('/api/faq', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${sessionStorage.getItem('token')}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ faq: myFaqs, sha: faqSha })
      });
      
      if(res.ok) {
        document.getElementById('faqStatus').textContent = "✅ FAQ başarıyla güncellendi!";
        document.getElementById('faqStatus').style.color = '#2ecc71';
        loadFaqs(); // Refresh SHA
      } else {
        alert("Kaydetme hatası. Sayfayı yenileyip tekrar deneyin.");
      }
      btn.disabled = false; btn.textContent = "Tüm Değişiklikleri GitHub'a Kaydet";
    }
  </script>
</body>
</html>
